<!doctype html>
<html lang="en" data-theme="paper">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#F5F2EA" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0C0A08" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>flick — read it in a flick</title>
    <meta
      name="description"
      content="flick — open-source speed reading. One word at a time, anchored at the optimal recognition point. Paste, drop or import anything and read it at your pace."
    />
    <meta property="og:title" content="flick — read it in a flick" />
    <meta
      property="og:description"
      content="Open-source speed reading. Paste, drop or import anything — read it one word at a time."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512.png" />
    <script>
      // stamp mode/theme before first paint so there is no flash; the theme
      // module (theme.svelte.ts) takes over from here and keeps these keys.
      (function () {
        try {
          var m = localStorage.getItem('flick.mode');
          var t = localStorage.getItem('flick.theme');
          var dark = m === 'dark' || (m !== 'light' && matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.setAttribute('data-mode', dark ? 'dark' : 'light');
          if (/^(paper|signal|sage|tide|dusk|noir)$/.test(t)) {
            document.documentElement.setAttribute('data-theme', t);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
